# 🐳 Docker Compose Override - Porturi Stabilite
# Acest fișier suprascrie porturile din docker-compose.yml principal

version: '3.8'

services:
  app:
    ports:
      - "3000:3000"  # Electric RAG - Port fix
    environment:
      - PORT=3000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000

  postgres:
    ports:
      - "5432:5432"  # PostgreSQL Electric

  redis:
    ports:
      - "6380:6379"  # Redis Electric (6380 extern)

  qdrant:
    ports:
      - "6333:6333"  # Qdrant HTTP
      - "6334:6334"  # Qdrant gRPC

  minio:
    ports:
      - "9000:9000"  # MinIO API
      - "9001:9001"  # MinIO Console

  unstructured:
    # Fără port expus extern - doar intern
    expose:
      - "8000"
